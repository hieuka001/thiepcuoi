<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;300&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background-color: #f3f5f7;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            padding: 30px;
            animation: pop 0.5s ease;
            max-width: 600px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin: 0 0 20px;
            color: #7a1f3b;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .date {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
            color: #6d7b8d;
        }
        @keyframes pop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>You're Invited!</h1>
        <p>Join us as we celebrate the union of <strong>[Name 1]</strong> and <strong>[Name 2]</strong>!</p>
        <p class="date">Date: [Insert Wedding Date]</p>
        <p>Venue: [Insert Venue Details]</p>
        <p>We look forward to seeing you there!</p>
    </div>
</body>
</html>
